<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lavender Boys</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07060b;
      --ink:#f4efff;
      --muted:rgba(244,239,255,.82);
      --stroke:rgba(255,255,255,.14);
      --glow:rgba(180,120,255,.45);
      --btn:#8e5cff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(186,120,255,.14), transparent 55%),
        radial-gradient(900px 700px at 80% 20%, rgba(110,220,255,.10), transparent 55%),
        radial-gradient(900px 700px at 60% 120%, rgba(255,140,210,.10), transparent 55%),
        var(--bg);
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      overflow-x:hidden;
    }

    /* No top banner. Content starts at top. */
    .wrap{
      display:flex;
      justify-content:center;
      padding: 20px 16px 34px;
    }

    .card{
      width:min(980px, 100%);
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
      background: rgba(255,255,255,.03);
      position:relative;
      isolation:isolate;
    }

    /* header above image so it's never covered/cropped */
    header{
      padding: 18px 18px 14px;
      background: rgba(0,0,0,.28);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    h1{
      margin:0;
      font-family: "Cinzel", ui-serif, Georgia, serif;
      font-size: clamp(34px, 4.2vw, 58px);
      line-height:1.02;
      text-shadow: 0 0 35px var(--glow);
      letter-spacing:.02em;
    }

    .sub{
      margin:10px 0 0;
      font-size:16px;
      color:var(--muted);
      line-height:1.5;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing:.02em;
    }

    .ctaRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:14px;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .sleepbtn{
      border:none;
      border-radius:999px;
      padding: 12px 18px;
      font-size:15px;
      color:var(--ink);
      cursor:pointer;
      background: rgba(142, 92, 255, .84);
      box-shadow: 0 10px 28px rgba(0,0,0,.45);
      transition: transform .12s ease, filter .12s ease;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    .sleepbtn:hover{ transform: translateY(-1px); filter: brightness(1.06); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
      color:rgba(244,239,255,.82);
    }

    /* Image area: ALWAYS show full image on first load */
    .hero{
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 14px;
      position:relative;
    }

    .hero img{
      width:100%;
      height:auto;
      /* Key: constrain by viewport so the entire cover is visible */
      max-height: calc(100vh - 220px); /* header + padding */
      object-fit: contain;
      display:block;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 70px rgba(0,0,0,.55);
      background:#000;
    }

    /* FX layer */
    .fx{
      pointer-events:none;
      position:fixed;
      inset:0;
      z-index:20;
    }

    .petal{
      position:absolute;
      width:16px;
      height:11px;
      border-radius: 12px 12px 12px 3px;
      background: rgba(210, 160, 255, .75);
      box-shadow: 0 0 22px rgba(180,120,255,.25);
      opacity:.0;
      transform: rotate(18deg);
      filter: blur(.15px);
    }

    .firefly{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:999px;
      background: rgba(255, 245, 190, .95);
      box-shadow: 0 0 14px rgba(255, 240, 150, .85);
      opacity:0;
    }

    @media (max-width: 640px){
      header{ padding: 16px 14px 12px; }
      .hero img{ max-height: calc(100vh - 260px); }
    }
  </style>
</head>

<body>
  <div class="fx" id="fx"></div>

  <div class="wrap">
    <main class="card">
      <header>
        <h1>Lavender Boys</h1>
        <p class="sub">Get sleepy with your bros</p>

        <div class="ctaRow">
          <button class="sleepbtn" id="sleepBtn" onclick="toggleSleep()">🌙 Sleep with the bros</button>

          <div class="pill" title="Completely scientific measurement">
            💤 Bros asleep: <span id="broCount">0</span>
          </div>

          <div class="pill" id="statusPill">Status: awake</div>

          <div class="pill" title="This number is fake on purpose">
            🌎 Bros sleeping worldwide: <span id="worldCount">4,218</span>
          </div>
        </div>
      </header>

      <section class="hero">
        <img src="cover.png" alt="Lavender Boys cover art" />
      </section>
    </main>
  </div>

  <script>
    // AUDIO (rain ambience)
    let sleeping = false;
    let bros = 0;

    const audio = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_9c9d7f7e41.mp3");
    audio.loop = true;
    audio.volume = 0.45;

    function toggleSleep(){
      const status = document.getElementById("statusPill");
      const btn = document.getElementById("sleepBtn");

      if(!sleeping){
        audio.play().catch(()=>{});
        sleeping = true;
        bros += 1;
        document.getElementById("broCount").textContent = String(bros);
        status.textContent = "Status: sleepy";
        btn.textContent = "🛌 Stop sleeping with the bros";
        startPetals();
      }else{
        audio.pause();
        sleeping = false;
        status.textContent = "Status: awake";
        btn.textContent = "🌙 Sleep with the bros";
      }
    }

    // FAKE global counter
    let world = 4218;
    function tickWorld(){
      const el = document.getElementById("worldCount");
      const bump = (Math.random() < 0.75) ? Math.floor(Math.random()*4) : Math.floor(Math.random()*12);
      world += bump;
      el.textContent = world.toLocaleString();
    }
    setInterval(tickWorld, 1400);

    // FX: fireflies + petals
    const fx = document.getElementById("fx");
    const fireflies = [];
    const FIREFLY_COUNT = 18;

    function rand(min,max){ return Math.random()*(max-min)+min; }

    function makeFirefly(){
      const f = document.createElement("div");
      f.className = "firefly";
      fx.appendChild(f);

      fireflies.push({
        el: f,
        x: rand(0, window.innerWidth),
        y: rand(0, window.innerHeight),
        vx: rand(-0.15, 0.15),
        vy: rand(-0.12, 0.12),
        phase: rand(0, Math.PI*2),
      });
    }
    for(let i=0;i<FIREFLY_COUNT;i++) makeFirefly();

    function animateFireflies(t){
      for(const o of fireflies){
        o.x += o.vx*16;
        o.y += o.vy*16;

        if(o.x < -20) o.x = window.innerWidth + 20;
        if(o.x > window.innerWidth + 20) o.x = -20;
        if(o.y < -20) o.y = window.innerHeight + 20;
        if(o.y > window.innerHeight + 20) o.y = -20;

        const pulse = (Math.sin((t/1000) + o.phase) + 1) / 2;
        o.el.style.opacity = String(0.10 + pulse*0.75);
        o.el.style.transform = `translate(${o.x}px, ${o.y}px)`;
      }
      requestAnimationFrame(animateFireflies);
    }
    requestAnimationFrame(animateFireflies);

    let petalTimer = null;

    function spawnPetal(){
      const p = document.createElement("div");
      p.className = "petal";
      fx.appendChild(p);

      const startX = rand(-50, window.innerWidth + 50);
      const startY = rand(-80, -20);
      const drift = rand(-0.35, 0.35);
      const fall = rand(0.65, 1.15);
      const spin = rand(-0.9, 0.9);
      const life = rand(9000, 14000);

      const start = performance.now();
      const rot0 = rand(0, 360);

      function step(now){
        const dt = now - start;
        const k = dt / life;
        if(k >= 1){
          p.remove();
          return;
        }
        const x = startX + drift * dt;
        const y = startY + fall * dt;
        const rot = rot0 + spin * dt * 0.06;

        const fadeIn = Math.min(1, k*6);
        const fadeOut = Math.min(1, (1-k)*6);
        const alpha = Math.min(fadeIn, fadeOut);

        p.style.opacity = String(alpha);
        p.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function startPetals(){
      if(petalTimer) return;
      for(let i=0;i<10;i++) setTimeout(spawnPetal, i*120);
      petalTimer = setInterval(()=>{
        if(sleeping) spawnPetal();
      }, 420);
    }
  </script>
</body>
</html>
