
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lavender Boys</title>

<meta property="og:title" content="Lavender Boys">
<meta property="og:description" content="Get sleepy with your bros">
<meta property="og:image" content="https://lavenderboys.com/preview.jpg">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
font-family:Inter,system-ui;
color:white;
overflow:hidden;
}

/* FULLSCREEN ART — NO DIMMING */
.hero{
position:fixed;
inset:0;
background-image:url("cover.png");
background-size:cover;
background-position:70% 50%;
background-repeat:no-repeat;
}

/* UI layer */
.ui{
position:relative;
z-index:2;
height:100vh;
display:flex;
align-items:center;
padding-left:6vw;
}

.stack{
display:flex;
flex-direction:column;
gap:14px;
}

/* HEADER — very light glass */
.titleCard{
display:inline-block;
width:fit-content;
padding:12px 16px;
border-radius:16px;
background:rgba(0,0,0,0.10);
backdrop-filter:blur(6px);
}

h1{
font-family:Cinzel,serif;
margin:0;
font-size:clamp(40px,5vw,64px);
}

.tagline{
margin-top:6px;
opacity:.9;
font-size:clamp(16px,2vw,22px);
}

/* controls */
.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
background:rgba(0,0,0,0.15);
backdrop-filter:blur(8px);
border-radius:999px;
padding:10px 14px;
width:fit-content;
}

.sleepbtn{
border:none;
border-radius:999px;
padding:10px 16px;
background:#8e5cff;
color:white;
font-size:15px;
cursor:pointer;
}

.pill{
background:rgba(0,0,0,0.15);
border-radius:999px;
padding:8px 12px;
font-size:14px;
}

/* fireflies */
.firefly{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#fff7b5;
box-shadow:0 0 12px #fff3a3;
opacity:.7;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="ui">
<div class="stack">

<div class="titleCard">
<h1>Lavender Boys</h1>
<div class="tagline">Get sleepy with your bros</div>
</div>

<div class="controls">
<button class="sleepbtn" onclick="toggleSleep()">🌙 Sleep with the bros</button>
<div class="pill">💤 Bros asleep: <span id="count">0</span></div>
<div class="pill" id="status">Status: awake</div>
</div>

</div>
</div>

<script>

let sleeping=false
let bros=0

const audio=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_9c9d7f7e41.mp3")
audio.loop=true
audio.volume=.4

function toggleSleep(){

if(!sleeping){
audio.play().catch(()=>{})
bros++
document.getElementById("count").innerText=bros
document.getElementById("status").innerText="Status: sleepy"
sleeping=true
}else{
audio.pause()
document.getElementById("status").innerText="Status: awake"
sleeping=false
}

}

/* simple fireflies */

for(let i=0;i<20;i++){
let f=document.createElement("div")
f.className="firefly"
f.style.left=Math.random()*100+"vw"
f.style.top=Math.random()*100+"vh"
document.body.appendChild(f)
}

</script>

</body>
</html>
