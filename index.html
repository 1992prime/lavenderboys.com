
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lavender Boys</title>

<meta property="og:title" content="Lavender Boys">
<meta property="og:description" content="Get sleepy with your bros">
<meta property="og:image" content="https://lavenderboys.com/preview.jpg">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
font-family:Inter,system-ui;
color:white;
overflow:hidden;
}

/* FULLSCREEN ART — NO DIMMING */
.hero{
position:fixed;
inset:0;
background-image:url("cover.png");
background-size:cover;
background-position:70% 50%;
background-repeat:no-repeat;
}

/* UI layer */
.ui{
position:relative;
z-index:2;
height:100vh;
display:flex;
align-items:center;
padding-left:6vw;
}

.stack{
display:flex;
flex-direction:column;
gap:14px;
}

/* HEADER — very light glass */
.titleCard{
display:inline-block;
width:fit-content;
padding:12px 16px;
border-radius:16px;
background:rgba(0,0,0,0.10);
backdrop-filter:blur(6px);
}

h1{
font-family:Cinzel,serif;
margin:0;
font-size:clamp(40px,5vw,64px);
}

.tagline{
margin-top:6px;
opacity:.9;
font-size:clamp(16px,2vw,22px);
}

/* controls */
.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
background:rgba(0,0,0,0.15);
backdrop-filter:blur(8px);
border-radius:999px;
padding:10px 14px;
width:fit-content;
}

.sleepbtn{
border:none;
border-radius:999px;
padding:10px 16px;
background:#8e5cff;
color:white;
font-size:15px;
cursor:pointer;
}

.pill{
background:rgba(0,0,0,0.15);
border-radius:999px;
padding:8px 12px;
font-size:14px;
}

/* fireflies */
.firefly{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#fff7b5;
box-shadow:0 0 12px #fff3a3;
opacity:.7;
}


.petal{
position:absolute;
width:16px;
height:11px;
border-radius:12px 12px 12px 3px;
background:rgba(210,160,255,.75);
box-shadow:0 0 22px rgba(180,120,255,.25);
opacity:0;
transform:rotate(18deg);
filter:blur(.15px);
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="ui">
<div class="stack">

<div class="titleCard">
<h1>Lavender Boys</h1>
<div class="tagline">Get sleepy with your bros</div>
</div>

<div class="controls">
<button class="sleepbtn" onclick="toggleSleep()">🌙 Sleep with the bros</button>
<div class="pill">💤 Bros asleep: <span id="count">0</span></div>
<div class="pill" id="status">Status: awake</div>
</div>

</div>
</div>

<script>
let sleeping=false;
let bros=0;

const countEl=document.getElementById("count");
const statusEl=document.getElementById("status");

/* Soft ambient loop (remote) */
const audio=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_9c9d7f7e41.mp3");
audio.loop=true;
audio.volume=0.45;

/* Add a tiny mute control (so mobile users aren't surprised) */
const controls=document.querySelector(".controls");
const mutePill=document.createElement("div");
mutePill.className="pill";
mutePill.style.cursor="pointer";
mutePill.title="Toggle sound";
mutePill.innerHTML="🔈 Sound: <span id='soundState'>off</span>";
controls.appendChild(mutePill);
const soundState=document.getElementById("soundState");

let soundOn=false;
function setSound(on){
  soundOn=on;
  soundState.textContent=on ? "on" : "off";
  mutePill.innerHTML = (on ? "🔊 Sound: " : "🔈 Sound: ") + "<span id='soundState'>" + (on ? "on" : "off") + "</span>";
}
mutePill.addEventListener("click", async ()=>{
  if(!soundOn){
    try{ await audio.play(); audio.pause(); }catch(e){}
    setSound(true);
  }else{
    audio.pause();
    setSound(false);
  }
});

function toggleSleep(){
  if(!sleeping){
    bros+=1;
    countEl.textContent=String(bros);
    statusEl.textContent="Status: sleepy";
    sleeping=true;

    if(soundOn){
      audio.play().catch(()=>{});
    }
    startPetals();
  }else{
    statusEl.textContent="Status: awake";
    sleeping=false;
    audio.pause();
  }
}

/* ---- Twinkly fireflies (animated, not baked into art) ---- */
const fxLayer=document.createElement("div");
fxLayer.style.position="fixed";
fxLayer.style.inset="0";
fxLayer.style.pointerEvents="none";
fxLayer.style.zIndex="3";
document.body.appendChild(fxLayer);

const FIREFLY_COUNT = 22;
const flies=[];

function rand(min,max){ return Math.random()*(max-min)+min; }

for(let i=0;i<FIREFLY_COUNT;i++){
  const el=document.createElement("div");
  el.className="firefly";
  el.style.opacity="0";
  fxLayer.appendChild(el);

  flies.push({
    el,
    x: rand(0, window.innerWidth),
    y: rand(0, window.innerHeight),
    vx: rand(-0.22, 0.22),
    vy: rand(-0.18, 0.18),
    phase: rand(0, Math.PI*2),
    size: rand(4, 7)
  });
  el.style.width = el.style.height = flies[i].size + "px";
}

function animateFlies(t){
  const w=window.innerWidth, h=window.innerHeight;
  for(const f of flies){
    f.x += f.vx * 16;
    f.y += f.vy * 16;

    if(f.x < -30) f.x = w + 30;
    if(f.x > w + 30) f.x = -30;
    if(f.y < -30) f.y = h + 30;
    if(f.y > h + 30) f.y = -30;

    const pulse=(Math.sin((t/900) + f.phase)+1)/2; // twinkle
    f.el.style.opacity = String(0.10 + pulse*0.75);
    f.el.style.transform = `translate(${f.x}px, ${f.y}px)`;
  }
  requestAnimationFrame(animateFlies);
}
requestAnimationFrame(animateFlies);

/* ---- Lavender petals (optional, only when "sleepy") ---- */
function makePetal(){
  const p=document.createElement("div");
  p.className="petal";
  fxLayer.appendChild(p);

  const startX=rand(-60, window.innerWidth+60);
  const startY=rand(-120, -20);
  const drift=rand(-0.35, 0.35);
  const fall=rand(0.70, 1.25);
  const spin=rand(-1.0, 1.0);
  const life=rand(9000, 14000);

  const start=performance.now();
  const rot0=rand(0, 360);

  function step(now){
    const dt=now-start;
    const k=dt/life;
    if(k>=1){ p.remove(); return; }

    const x=startX + drift*dt;
    const y=startY + fall*dt;
    const rot=rot0 + spin*dt*0.06;

    const fadeIn=Math.min(1, k*6);
    const fadeOut=Math.min(1, (1-k)*6);
    const alpha=Math.min(fadeIn, fadeOut);

    p.style.opacity=String(alpha);
    p.style.transform=`translate(${x}px, ${y}px) rotate(${rot}deg)`;
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

let petalTimer=null;
function startPetals(){
  if(petalTimer) return;
  for(let i=0;i<8;i++) setTimeout(makePetal, i*140);
  petalTimer=setInterval(()=>{ if(sleeping) makePetal(); }, 520);
}

/* Wire the button again (because older HTML uses inline handler) */
window.toggleSleep=toggleSleep;
</script>

</body>
</html>
